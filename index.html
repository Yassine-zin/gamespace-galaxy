<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GameSpace Galaxy V3</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#111827);
color:white;
text-align:center;
padding:20px;
}

.box{
max-width:430px;
margin:auto;
background:#111827;
padding:25px;
border-radius:20px;
box-shadow:0 0 30px rgba(56,189,248,.2);
}

h1{color:#38bdf8;}
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.login{background:#3b82f6;color:white;}
.reward{background:#22c55e;color:white;}
.mission{background:#f59e0b;color:white;}
.pay{background:#8b5cf6;color:white;}

.card{
margin-top:14px;
padding:14px;
background:#0f172a;
border-radius:12px;
}

.small{font-size:13px;opacity:.8;}
</style>
</head>

<body>

<div class="box">

<h1>🚀 GameSpace Galaxy</h1>
<p>Play • Earn • Rule the Pi Universe</p>

<button class="login" onclick="login()">🔐 Login with Pi</button>

<div class="card">
<p id="user">Guest Mode</p>
<p>🏆 Rank: <span id="rank">Rookie</span></p>
<p>⭐ XP: <span id="xp">0</span></p>
<p>🪙 Reward: <span id="reward">0</span> π</p>
</div>

<button class="reward" onclick="claim()">🎁 Claim Daily Reward</button>
<button class="mission" onclick="mission()">⚔️ Start Mission</button>
<button class="pay" onclick="premium()">💎 Unlock Premium</button>

</div>

<script>
let user=null;
let xp=0;
let reward=0;

window.onload=()=>{
Pi.init({version:"2.0",sandbox:true});
}

async function login(){
try{
user=await Pi.authenticate(['username','payments']);
document.getElementById("user").innerText="Commander "+user.user.username;
}catch(e){
alert("Login failed");
}
}

function updateRank(){
let rank="Rookie";
if(xp>=50) rank="Warrior";
if(xp>=100) rank="Elite";
if(xp>=200) rank="Legend";
document.getElementById("rank").innerText=rank;
}

function claim(){
if(!user){alert("Login first");return;}
reward+=0.01;
xp+=10;
document.getElementById("reward").innerText=reward.toFixed(2);
document.getElementById("xp").innerText=xp;
updateRank();
alert("🎁 Reward Claimed!");
}

function mission(){
if(!user){alert("Login first");return;}
xp+=25;
document.getElementById("xp").innerText=xp;
updateRank();
alert("⚔️ Mission Complete +25 XP");
}

function premium(){
if(!user){alert("Login first");return;}

Pi.createPayment(
{
amount:0.001,
memo:"Premium Unlock",
metadata:{app:"GameSpace Galaxy"}
},
{
onReadyForServerApproval:function(paymentId){
fetch("/api/approve",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId})});
},

onReadyForServerCompletion:function(paymentId,txid){
fetch("/api/complete",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId,txid})});

alert("💎 Premium Activated!");
},

onCancel:function(){alert("Cancelled");},
onError:function(e){alert("Error");}
}
);
}
</script>

</body>
</html>
