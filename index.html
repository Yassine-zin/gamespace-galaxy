<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GameSpace Galaxy</title>

<style>
body{
background:#070b1a;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}
.box{
max-width:420px;
margin:auto;
background:#11182c;
padding:25px;
border-radius:18px;
}
button{
padding:14px 22px;
font-size:16px;
border:none;
border-radius:12px;
background:#6c5ce7;
color:white;
cursor:pointer;
margin-top:15px;
width:100%;
}
button:disabled{
opacity:.6;
}
.small{font-size:13px;opacity:.7;margin-top:10px;}
.ok{color:#00e676;}
.err{color:#ff5252;}
</style>
</head>

<body>

<div class="box" id="app">
Loading...
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
const app = document.getElementById("app");

Pi.init({
  version:"2.0",
  sandbox:false
});

function onIncompletePaymentFound(payment){
  console.log(payment);
}

function saveUser(u){
 localStorage.setItem("pi_user", JSON.stringify(u));
}

function getUser(){
 try{
   return JSON.parse(localStorage.getItem("pi_user"));
 }catch(e){
   return null;
 }
}

async function login(){

 try{

 const auth = await Pi.authenticate(
   ["username"],
   onIncompletePaymentFound
 );

 saveUser(auth);

 render(auth);

 }catch(e){

 app.innerHTML = `
 <h2 class="err">Login Failed ❌</h2>
 <button onclick="login()">Retry</button>
 `;

 }

}

function render(user){

 app.innerHTML = `
 <h2 class="ok">Welcome ${user.user.username} 🚀</h2>
 <p>Galaxy access granted</p>

 <button id="payBtn" onclick="buyBoost()">
 Buy Boost (1 Pi)
 </button>

 <div class="small">
 UID: ${user.user.uid}
 </div>

 <div class="small" id="status"></div>
 `;

}

function buyBoost(){

 const btn = document.getElementById("payBtn");
 const status = document.getElementById("status");

 btn.disabled = true;
 btn.innerText = "Processing...";
 status.innerText = "Opening Pi Payment...";

 try{

 Pi.createPayment({
   amount:1,
   memo:"Galaxy Boost",
   metadata:{ item:"boost" }

 },{

   onReadyForServerApproval:function(paymentId){
     status.innerText = "Waiting approval...";
     console.log(paymentId);
   },

   onReadyForServerCompletion:function(paymentId,txid){
     status.innerText = "Completing payment...";
   },

   onCancel:function(paymentId){
     status.innerText = "Payment cancelled";
     btn.disabled = false;
     btn.innerText = "Buy Boost (1 Pi)";
   },

   onError:function(error,payment){
     console.log(error);
     status.innerText = "Payment error ❌";
     btn.disabled = false;
     btn.innerText = "Buy Boost (1 Pi)";
   },

   onComplete:function(payment,txid){
     status.innerText = "Boost Activated 🚀";
     btn.innerText = "Purchased ✅";
   }

 });

 }catch(err){

 status.innerText = "Cannot open payment";
 btn.disabled = false;
 btn.innerText = "Buy Boost (1 Pi)";

 }

}

window.onload = function(){

 const user = getUser();

 if(user){
   render(user);
 }else{
   login();
 }

}
</script>

</body>
</html>
