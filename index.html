<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GameSpace Galaxy</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#08142d;
color:white;
text-align:center;
padding:30px;
}
.card{
background:#15233f;
padding:25px;
border-radius:20px;
max-width:420px;
margin:auto;
box-shadow:0 0 25px rgba(0,0,0,.4);
}
h1{font-size:50px;margin-bottom:10px}
p{opacity:.8}
button{
width:100%;
padding:20px;
font-size:28px;
border:none;
border-radius:18px;
margin:12px 0;
color:white;
font-weight:bold;
cursor:pointer;
}
.blue{background:#2463ff}
.green{background:#17b44a}
.purple{background:#9c31ff}
.status{
margin-top:15px;
padding:20px;
background:#2d3e59;
border-radius:15px;
font-size:28px;
}
</style>
</head>

<body>

<div class="card">
<h1>🚀 GameSpace Galaxy</h1>
<p>Play • Earn • Rule the Pi Universe</p>

<button class="blue" onclick="loginPi()">🔐 Login with Pi</button>
<button class="green" onclick="reward()">🎁 Claim Reward</button>
<button class="purple" onclick="premium()">💎 Premium Access</button>

<div class="status" id="status">Ready...</div>
</div>

<script>
Pi.init({ version: "2.0", sandbox: true });

async function loginPi(){
try{
const scopes = ['username','payments'];

const auth = await Pi.authenticate(scopes, function(payment){});

document.getElementById("status").innerHTML =
"✅ Welcome " + auth.user.username;

}catch(e){
document.getElementById("status").innerHTML =
"❌ Login failed";
}
}

function reward(){
document.getElementById("status").innerHTML =
"🎁 Reward claimed!";
}

function premium(){
document.getElementById("status").innerHTML =
"💎 Premium coming soon!";
}
</script>

</body>
</html>
