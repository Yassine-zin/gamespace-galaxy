<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GameSpace Galaxy</title>

<style>
body{
  margin:0;
  padding:0;
  background:#050816;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
}

.wrap{
  padding:40px 20px;
}

.logo{
  font-size:42px;
  margin-top:30px;
}

h1{
  margin:10px 0;
  font-size:32px;
}

p{
  opacity:.8;
}

.card{
  background:#11182c;
  margin:25px auto;
  padding:20px;
  border-radius:18px;
  max-width:420px;
}

button{
  background:#6c5ce7;
  color:white;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  font-size:16px;
  margin-top:12px;
  cursor:pointer;
}

button:active{
  transform:scale(.98);
}

.small{
  font-size:13px;
  opacity:.7;
  margin-top:12px;
}

.success{
  color:#00e676;
}

.error{
  color:#ff5252;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="logo">🌌</div>
  <h1>GameSpace Galaxy</h1>
  <p>Pi Web3 Gaming Platform</p>

  <div class="card" id="app">
    Loading...
  </div>
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
const app = document.getElementById("app");

// ========================
// PI INIT
// ========================
Pi.init({
  version: "2.0",
  sandbox: false
});

// ========================
// PAYMENT CALLBACK
// ========================
function onIncompletePaymentFound(payment) {
  console.log("Incomplete Payment:", payment);
}

// ========================
// SAVE USER
// ========================
function saveUser(data){
  localStorage.setItem("pi_user", JSON.stringify(data));
}

function getUser(){
  try{
    return JSON.parse(localStorage.getItem("pi_user"));
  }catch(e){
    return null;
  }
}

// ========================
// LOGIN
// ========================
async function loginPi(){

  app.innerHTML = `
    <h2>Connecting to Pi...</h2>
    <p class="small">Please wait</p>
  `;

  try{

    const auth = await Pi.authenticate(
      ["username"],
      onIncompletePaymentFound
    );

    saveUser(auth);

    app.innerHTML = `
      <h2 class="success">Welcome ${auth.user.username} 🚀</h2>
      <p>Galaxy access granted</p>

      <button onclick="buyBoost()">
        Buy Boost (1 Pi)
      </button>

      <div class="small">
        UID: ${auth.user.uid}
      </div>
    `;

  }catch(err){

    console.log(err);

    app.innerHTML = `
      <h2 class="error">Login Failed ❌</h2>
      <p class="small">Try opening from Pi Browser</p>

      <button onclick="loginPi()">
        Retry Login
      </button>
    `;
  }
}

// ========================
// PAYMENT
// ========================
function buyBoost(){

  const user = getUser();

  if(!user){
    loginPi();
    return;
  }

  Pi.createPayment({
    amount: 1,
    memo: "Galaxy Boost",
    metadata: { item:"boost" }

  },{

    onReadyForServerApproval: function(paymentId){
      console.log("Approve:", paymentId);
    },

    onReadyForServerCompletion: function(paymentId, txid){
      console.log("Complete:", paymentId, txid);
    },

    onCancel: function(paymentId){
      alert("Payment cancelled");
    },

    onError: function(error, payment){
      console.log(error);
      alert("Payment error");
    },

    onComplete: function(payment, txid){
      alert("Boost Activated 🚀");
    }

  });
}

// ========================
// AUTO START
// ========================
window.onload = function(){

  const user = getUser();

  if(user && user.user){
    app.innerHTML = `
      <h2 class="success">Welcome Back ${user.user.username} 🚀</h2>

      <button onclick="buyBoost()">
        Buy Boost (1 Pi)
      </button>

      <div class="small">
        Saved Session
      </div>
    `;
  }else{
    loginPi();
  }
};
</script>

</body>
</html>
