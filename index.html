 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GameSpace Galaxy</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}
.card{
max-width:420px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}
h1{font-size:32px;margin-bottom:5px;}
p{color:#cbd5e1;}
button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
color:white;
cursor:pointer;
}
.login{background:#2563eb;}
.reward{background:#16a34a;}
.premium{background:#9333ea;}
.notice{
margin-top:15px;
padding:12px;
border-radius:12px;
background:#334155;
}
</style>
</head>

<body>

<div class="card">

<h1>🚀 GameSpace Galaxy</h1>
<p>Play • Earn • Rule the Pi Universe</p>

<button class="login" onclick="login()">🔐 Login with Pi</button>
<button class="reward" onclick="reward()">🎁 Claim Reward</button>
<button class="premium" onclick="premium()">💎 Premium Access</button>

<div class="notice" id="msg">Ready</div>

</div>

<script>
let currentUser=null;

function show(t){
document.getElementById("msg").innerText=t;
}

async function login(){
try{
Pi.init({version:"2.0",sandbox:true});
const auth = await Pi.authenticate(['username'], onIncompletePaymentFound);
currentUser=auth.user;
show("Welcome "+currentUser.username);
}catch(e){
show("Login failed");
}
}

function reward(){
show("🎁 Reward claimed!");
}

function onIncompletePaymentFound(payment){
console.log(payment);
}

async function premium(){
try{
const payment = await Pi.createPayment({
amount:0.01,
memo:"Premium Access",
metadata:{type:"premium"}
},{
onReadyForServerApproval:function(paymentId){
show("⏳ Waiting approval...");
},

onReadyForServerCompletion:function(paymentId,txid){
show("✅ Premium unlocked!");
},

onCancel:function(paymentId){
show("❌ Payment cancelled");
},

onError:function(error,payment){
show("⚠️ Payment failed");
}
});

}catch(e){
show("Payment error");
}
}
</script>

</body>
</html>
