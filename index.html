<!DOCTYPE html>
<html>
<head>
  <title>GameSpace Galaxy V2</title>
</head>

<body>
  <h1>🌌 Galaxy Loading...</h1>
  <div id="app"></div>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <script>
    Pi.init({
  version: "2.0",
  sandbox: false
});

    function getUser() {
      try {
        return JSON.parse(localStorage.getItem("pi_user"));
      } catch {
        return null;
      }
    }

    function saveUser(user) {
      localStorage.setItem("pi_user", JSON.stringify(user));
    }

    let authInProgress = false;

    async function login() {
      if (authInProgress) return;
      authInProgress = true;

      try {
        const auth = await Pi.authenticate(['username']);

        saveUser(auth);

        // 🔗 backend sync (IMPORTANT FIX)
        await fetch("https://YOUR-BACKEND.onrender.com/user/sync", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            piUserId: auth.user.uid,
            username: auth.user.username
          })
        });

        return auth;

      } catch (e) {
        console.log("Login error:", e);
      } finally {
        authInProgress = false;
      }
    }

    async function start() {
      const app = document.getElementById("app");

      let user = getUser();

      if (!user) {
        app.innerHTML = "<h2>Logging in with Pi...</h2>";
        user = await login();
      }

      if (user) {
        app.innerHTML = `
          <h2>Welcome ${user.user.username} 🚀</h2>
          <button onclick="buyBoost()">Buy Boost (1 Pi)</button>
        `;
      } else {
        app.innerHTML = "<h2>Login failed ❌</h2>";
      }
    }

    function buyBoost() {
      const user = getUser();

      Pi.createPayment({
        amount: 1,
        memo: "Galaxy Boost",
        metadata: { item: "boost" }
      }, {
        onReadyForServerApproval: function(paymentId) {

          fetch("https://YOUR-BACKEND.onrender.com/pay/approve", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              paymentId,
              piUserId: user.user.uid,
              item: "boost"
            })
          });

        },

        onComplete: function() {
          alert("Payment successful 🚀");
        },

        onError: function(err) {
          console.log("Payment error:", err);
        }
      });
    }

    start();
  </script>

</body>
</html>
